<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Monitoring System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

  <!-- HEADER -->
  <div class="text-center mb-6">
    <h1 class="text-4xl font-bold text-gray-800">🏫 Visitor Monitoring System</h1>
    <p class="text-gray-500">Modern Access Control Dashboard</p>
  </div>

  <!-- VISITOR FORM -->
  <div class="bg-white p-5 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-3">Add Visitor</h2>

    <input id="name" placeholder="Full Name"
      class="border p-2 rounded w-full mb-2 focus:ring-2 focus:ring-blue-400" />

    <input id="purpose" placeholder="Purpose of Visit"
      class="border p-2 rounded w-full mb-3 focus:ring-2 focus:ring-blue-400" />

    <button onclick="addVisitor()"
      class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
      Add Visitor
    </button>
  </div>

  <!-- ACTIONS -->
  <div class="flex gap-3 mb-6">
    <button onclick="loadVisitors()"
      class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">
      Load Visitors
    </button>

    <button onclick="loadReport()"
      class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-lg">
      Daily Report
    </button>
  </div>

  <!-- QR CHECK-IN -->
  <div class="bg-white p-5 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-3">Check-in (QR Code)</h2>

    <input id="qr" placeholder="Paste QR string here"
      class="border p-2 rounded w-full mb-3" />

    <button onclick="checkin()"
      class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
      Check-in
    </button>
  </div>

  <!-- CHECK OUT -->
  <div class="bg-white p-5 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-3">Check-out</h2>

    <input id="checkoutId" placeholder="Visitor ID"
      class="border p-2 rounded w-full mb-3" />

    <button onclick="checkout()"
      class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
      Check-out
    </button>
  </div>

  <!-- REPORT -->
  <div id="report" class="mb-6"></div>

  <!-- VISITOR LIST -->
  <div id="list" class="grid gap-4"></div>


<script>
const API = "http://localhost:3000"; // change to Render URL if deployed

// ================= ADD VISITOR =================
async function addVisitor() {
  const name = document.getElementById("name").value;
  const purpose = document.getElementById("purpose").value;

  await fetch(`${API}/visitors`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, purpose })
  });

  loadVisitors();
}

// ================= LOAD VISITORS =================
async function loadVisitors() {
  const res = await fetch(`${API}/visitors`);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(v => {
    list.innerHTML += `
      <div class="bg-white p-4 rounded-xl shadow border">
        <p class="text-lg font-bold">${v.name}</p>
        <p class="text-gray-600">Purpose: ${v.purpose}</p>
        <p class="text-sm mt-1">Status: <b>${v.status}</b></p>
        <p class="text-xs text-gray-400">ID: ${v.id}</p>

        <div class="mt-3 flex gap-2 flex-wrap">

          ${v.status === "PENDING" ? `
            <button onclick="approve('${v.id}')"
              class="bg-blue-500 text-white px-3 py-1 rounded">
              Approve
            </button>
          ` : ""}

        </div>
      </div>
    `;
  });
}

// ================= APPROVE =================
async function approve(id) {
  const res = await fetch(`${API}/visitors/${id}/approve`, {
    method: "PUT"
  });

  const data = await res.json();
  alert("QR GENERATED:\n" + data.qr);

  loadVisitors();
}

// ================= CHECK-IN =================
async function checkin() {
  const qr = document.getElementById("qr").value;

  await fetch(`${API}/visitors/checkin`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ qr })
  });

  loadVisitors();
}

// ================= CHECK-OUT =================
async function checkout() {
  const id = document.getElementById("checkoutId").value;

  await fetch(`${API}/visitors/checkout/${id}`, {
    method: "PUT"
  });

  loadVisitors();
}

// ================= DAILY REPORT =================
async function loadReport() {
  const res = await fetch(`${API}/reports/daily`);
  const data = await res.json();

  document.getElementById("report").innerHTML = `
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-2">📊 Daily Report</h2>
      <p>Total: ${data.total}</p>
      <p>Pending: ${data.pending}</p>
      <p>Approved: ${data.approved}</p>
      <p>Checked-in: ${data.checkedIn}</p>
      <p>Exited: ${data.exited}</p>
    </div>
  `;
}
</script>

</body>
</html>
